# HorizontalPodAutoscaler for the Zenith Ingestor
# Scales the ingestor based on CPU utilization
#
# Prerequisites:
# - metrics-server must be installed in the cluster: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# - For Kind: patch with --kubelet-insecure-tls to allow metrics scraping from self-signed kubelets
# - CPU requests must be set on the Deployment (see ingestor-deployment.yml)
#
# Apply with:
#   kubectl apply -f deployments/k8s/local/ingestor-hpa.yaml -n zenith-dev

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zenith-ingestor-hpa
  namespace: zenith-dev
  labels:
    app: zenith-ingestor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zenith-ingestor-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60

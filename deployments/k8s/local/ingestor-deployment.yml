apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-ingestor-deployment
  labels:
    app: zenith-ingestor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zenith-ingestor
  template:
    metadata:
      labels:
        app: zenith-ingestor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: zenith-ingestor
        image: zenith-ingestor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: grpc-http
        - containerPort: 8082
          name: metrics
        envFrom:
        - configMapRef:
            name: zenith-config
        - secretRef:
            name: zenith-secrets
        volumeMounts:
        - name: ca-cert
          mountPath: "/root/.postgresql"
          readOnly: true

        # Resource management: prevent noisy neighbor problem and enable proper scheduling
        resources:
          requests:
            cpu: "100m"            # Reservation: scheduler allocates at least 0.1 CPU
            memory: "64Mi"         # Reservation: scheduler allocates at least 64 MiB
          limits:
            cpu: "500m"            # Hard limit: CPU throttling after 0.5 cores
            memory: "256Mi"        # Hard limit: OOM killed if exceeded

        # Startup probe: give time for application to bootstrap (DB connection, migrations, etc.)
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 10

        # Readiness probe: traffic routed only to ready pods during rolling updates
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2

        # Liveness probe: restart pod if it becomes unresponsive
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: ca-cert
        secret:
          secretName: zenith-ca-cert
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

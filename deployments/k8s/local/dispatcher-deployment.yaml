apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenith-dispatcher-deployment
  labels:
    app: zenith-dispatcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zenith-dispatcher
  template:
    metadata:
      labels:
        app: zenith-dispatcher
    spec:
      containers:
      - name: zenith-dispatcher
        image: zenith-dispatcher:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: zenith-config
        - secretRef:
            name: zenith-secrets
        volumeMounts:
        - name: ca-cert
          mountPath: "/root/.postgresql"
          readOnly: true

        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"

        startupProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 10

        readinessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

      volumes:
      - name: ca-cert
        secret:
          secretName: zenith-ca-cert

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

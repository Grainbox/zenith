name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: europe-west1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Lint — golangci-lint + buf lint
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Generate Protobuf code
        run: buf generate

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Run buf lint
        run: buf lint

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Test — tests unitaires Go (sans tests d'intégration)
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-golangci-${{ hashFiles('go.mod') }}
          restore-keys: |
            ${{ runner.os }}-golangci-

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Generate Protobuf code
        run: buf generate

      - name: Run unit tests
        run: go test -short -race -count=1 ./...

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Build & Push — image Docker vers Artifact Registry
  # ──────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f build/package/Dockerfile \
            --build-arg COMMIT_HASH=${{ env.IMAGE_TAG }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zenith/ingestor:${{ env.IMAGE_TAG }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zenith/ingestor:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zenith/ingestor:${{ env.IMAGE_TAG }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zenith/ingestor:latest

  # ──────────────────────────────────────────────────────────────────
  # Job 4: Deploy — terraform apply avec le nouveau tag d'image
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: deployments/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}"

      - name: Terraform Plan
        run: |
          terraform plan -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -var="image_tag=${{ env.IMAGE_TAG }}" -var="database_url=${{ secrets.DATABASE_URL }}" -var="api_key_salt=${{ secrets.API_KEY_SALT }}" -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL }}" -out=tfplan -no-color -lock=false -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -lock=false tfplan

      - name: Get deployed URL
        run: |
          SERVICE_URL=$(terraform output -raw service_url)
          echo "✅ Deployed to: ${SERVICE_URL}" >> $GITHUB_STEP_SUMMARY
